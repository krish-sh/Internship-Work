<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>List</h1>
    <!-- ordered -->
    <ol type="I">
      <li>apple</li>
      <li>banana</li>
      <li>Mango</li>
      <li>Pineapple</li>
      <li>Strawberry</li>
    </ol>
    <!-- unordered -->
    <ul>
      <li>Apple</li>
      <li>Banana</li>
      <li>Mango</li>
    </ul>
    <!-- discription -->
    <dl>
      <dt>HTML</dt>
      <dd>Hyper text markup language</dd>
      <dt>CSS</dt>
      <dd>Cascading style sheet</dd>
    </dl>
  </body>
</html>
